<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - CropPulse</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <h2>🌱 CropPulse</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="booking.html">Book Scan</a>
  </div>
</nav>

<h2 style="text-align:center;">Your Farm Analysis</h2>

<!-- GRID -->
<div style="display:flex; justify-content:center;">
  <div id="grid" style="display:grid; grid-template-columns: repeat(6, 50px); gap:6px;"></div>
</div>

<!-- POPUP -->
<div id="popup" class="card" style="position:fixed; right:20px; top:100px; display:none; width:250px;"></div>

<script>
function loadDashboard() {
  const grid = document.getElementById("grid");
  const popup = document.getElementById("popup");

  for (let i = 0; i < 36; i++) {
    let block = document.createElement("div");
    block.style.width = "50px";
    block.style.height = "50px";
    block.style.borderRadius = "6px";

    let rand = Math.random();
    let status = "";

    if (rand > 0.6) {
      block.style.background = "#22c55e";
      status = "Healthy";
    } else if (rand > 0.3) {
      block.style.background = "#eab308";
      status = "Moderate";
    } else {
      block.style.background = "#ef4444";
      status = "Critical";
    }

    block.onmouseover = () => {
      popup.style.display = "block";
      popup.innerHTML = `
        <h3>${status}</h3>
        🌱 pH: ${(5 + Math.random()*3).toFixed(1)}<br>
        💧 Moisture: ${Math.floor(Math.random()*100)}%<br>
        🐛 Pest Risk: ${Math.floor(Math.random()*20)}%<br>
      `;
    };

    grid.appendChild(block);
  }
}

loadDashboard();
</script>

</body>
</html>
