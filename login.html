<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CropPulse Login</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body {
      background: #f4f6f9;
      font-family: Arial, sans-serif;
    }
    .login-container {
      max-width: 400px;
      margin: 80px auto;
      padding: 25px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    }
    .btn-primary {
      border-radius: 10px;
      padding: 10px;
      font-size: 16px;
      font-weight: bold;
    }
    .form-control {
      border-radius: 10px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h3 class="text-center mb-4">Login with Phone</h3>

    <!-- Phone Number Input -->
    <input type="text" id="phoneNumber" class="form-control" placeholder="+91XXXXXXXXXX">

    <!-- Send OTP Button -->
    <div id="recaptcha-container"></div>
    <button id="sendOtpBtn" class="btn btn-primary btn-block">Send OTP</button>

    <!-- OTP Input -->
    <input type="text" id="otp" class="form-control mt-3" placeholder="Enter OTP">

    <!-- Verify OTP Button -->
    <button id="verifyOtpBtn" class="btn btn-success btn-block">Verify OTP</button>

    <!-- Status -->
    <p id="status" class="text-center text-danger mt-3"></p>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-check-compat.js"></script>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCQ7q-b-uX4rNv8pOYOeu3mOa__jtGvo3M",
      authDomain: "croppulse-0316.firebaseapp.com",
      projectId: "croppulse-0316",
      storageBucket: "croppulse-0316.appspot.com",
      messagingSenderId: "139230612217",
      appId: "1:139230612217:web:c5887c9c02de587ba47028"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);

    // ---- Firebase App Check ----
    // 1) In Firebase Console → App Check → Web app: create a reCAPTCHA v3 site key
    // 2) Paste it below. For localhost, we enable a debug token automatically.
    const APP_CHECK_SITE_KEY = ""; // TODO: set your reCAPTCHA v3 site key here
    if (location.hostname === 'localhost') {
      // Dev convenience: allow debug token locally
      self.FIREBASE_APPCHECK_DEBUG_TOKEN = true;
    }
    if (APP_CHECK_SITE_KEY) {
      firebase.appCheck().activate(APP_CHECK_SITE_KEY, true);
    }

    const auth = firebase.auth();

    // Setup reCAPTCHA (invisible for better UX)
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
      'size': 'invisible'
    });

    let confirmationResult;

    // Helper functions
    function setStatus(msg, isError = false) {
      const el = document.getElementById('status');
      el.innerText = msg;
      el.className = `text-center mt-3 ${isError ? 'text-danger' : 'text-success'}`;
    }

    function normalizePhone(value) {
      const trimmed = (value || '').trim();
      if (!trimmed.startsWith('+')) return '+91' + trimmed.replace(/[^\d]/g, '');
      return trimmed;
    }

    // Send OTP
    document.getElementById('sendOtpBtn').addEventListener('click', async () => {
      const phone = normalizePhone(document.getElementById('phoneNumber').value);
      if (!/^\+[1-9]\d{6,15}$/.test(phone)) {
        setStatus('Enter a valid phone number in international format (e.g., +919876543210).', true);
        return;
      }

      try {
        const appVerifier = window.recaptchaVerifier;
        confirmationResult = await auth.signInWithPhoneNumber(phone, appVerifier);
        setStatus('OTP sent successfully!');
      } catch (error) {
        console.error(error);
        if (error && error.code === 'auth/billing-not-enabled') {
          setStatus('Error: Billing not enabled. In Firebase Console → Authentication → Settings, disable reCAPTCHA Enterprise or enable billing.', true);
        } else {
          setStatus('Error sending OTP: ' + error.message, true);
        }
        // Reset reCAPTCHA on error
        if (window.grecaptcha) {
          window.grecaptcha.reset();
        }
      }
    });

    // Verify OTP
    document.getElementById('verifyOtpBtn').addEventListener('click', async () => {
      const code = document.getElementById('otp').value.trim();
      if (!code) {
        setStatus('Enter the OTP.', true);
        return;
      }

      try {
        const result = await confirmationResult.confirm(code);
        const user = result.user;
        setStatus('✅ OTP Verified! Login successful.');
        console.log('User:', user);
        // Redirect to dashboard
        window.location.href = 'dashboard.html';
      } catch (error) {
        console.error(error);
        setStatus('Invalid OTP. Try again.', true);
      }
    });
  </script>
</body>
</html>
