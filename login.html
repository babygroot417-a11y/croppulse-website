<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CropPulse Login</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body {
      background: #f4f6f9;
      font-family: Arial, sans-serif;
    }
    .login-container {
      max-width: 400px;
      margin: 80px auto;
      padding: 25px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    }
    .btn-primary {
      border-radius: 10px;
      padding: 10px;
      font-size: 16px;
      font-weight: bold;
    }
    .form-control {
      border-radius: 10px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h3 class="text-center mb-4">Login with Phone</h3>

    <!-- Phone Number Input -->
    <input type="text" id="phoneNumber" class="form-control" placeholder="+91XXXXXXXXXX">

    <!-- Send OTP Button -->
    <div id="recaptcha-container"></div>
    <button id="sendOtpBtn" class="btn btn-primary btn-block">Send OTP</button>

    <!-- OTP Input -->
    <input type="text" id="otp" class="form-control mt-3" placeholder="Enter OTP">

    <!-- Verify OTP Button -->
    <button id="verifyOtpBtn" class="btn btn-success btn-block">Verify OTP</button>

    <!-- Status -->
    <p id="status" class="text-center text-danger mt-3"></p>
  </div>

  <script>
    // Simple custom OTP client for CropPulse (no Firebase)
    function setStatus(msg, isError) {
      var el = document.getElementById('status');
      el.innerText = msg;
      el.className = 'text-center mt-3 ' + (isError ? 'text-danger' : 'text-success');
    }

    function normalizePhone(value) {
      var trimmed = (value || '').trim();
      if (trimmed.indexOf('+') !== 0) return '+91' + trimmed.replace(/[^\d]/g, '');
      return trimmed;
    }

    document.getElementById('sendOtpBtn').addEventListener('click', function () {
      var phone = normalizePhone(document.getElementById('phoneNumber').value);
      if (!/^\+[1-9]\d{6,15}$/.test(phone)) {
        setStatus('Enter a valid phone number in international format (e.g., +919876543210).', true);
        return;
      }
      fetch('/api/send-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone: phone })
      }).then(function (r) { return r.json(); }).then(function (data) {
        if (data && data.ok) {
          setStatus('OTP sent successfully!');
        } else {
          setStatus('Failed to send OTP: ' + (data && data.error ? data.error : 'unknown'), true);
        }
      }).catch(function (e) {
        console.error(e);
        setStatus('Failed to send OTP.', true);
      });
    });

    document.getElementById('verifyOtpBtn').addEventListener('click', function () {
      var phone = normalizePhone(document.getElementById('phoneNumber').value);
      var code = (document.getElementById('otp').value || '').trim();
      if (!code) { setStatus('Enter the OTP.', true); return; }
      fetch('/api/verify-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone: phone, code: code })
      }).then(function (r) { return r.json(); }).then(function (data) {
        if (data && data.ok) {
          setStatus('✅ OTP Verified! Login successful.');
          // window.location.href = 'dashboard.html';
        } else {
          setStatus('Invalid OTP. Try again.', true);
        }
      }).catch(function (e) {
        console.error(e);
        setStatus('Verification failed.', true);
      });
    });
  </script>
</body>
</html>
