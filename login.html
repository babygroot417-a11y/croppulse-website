<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CropPulse Login</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --primary: #22c55e;
      --secondary: #3b82f6;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: var(--card);
      padding: 30px;
      border-radius: 20px;
      width: 320px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    h2 {
      color: var(--primary);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      background: #020617;
      color: white;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .otp-box {
      display: none;
    }

    .icon {
      margin-bottom: 10px;
      color: var(--primary);
    }

    p {
      color: var(--muted);
      font-size: 14px;
    }

    .back {
      margin-top: 10px;
      display: block;
      color: var(--secondary);
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="login-box">

  <div class="icon">
    <i data-lucide="sprout"></i>
  </div>

  <h2>CropPulse</h2>
  <p>Login using your phone number</p>

  <!-- PHONE LOGIN -->
  <div id="phoneBox">
    <input type="text" id="phone" placeholder="Enter phone number">
    <button onclick="sendOTP()">Send OTP</button>
  </div>

  <!-- OTP BOX -->
  <div id="otpBox" class="otp-box">
    <input type="text" id="otp" placeholder="Enter OTP">
    <button onclick="verifyOTP()">Verify OTP</button>
    <span class="back" onclick="goBack()">← Change Number</span>
  </div>

</div>

<script>
  lucide.createIcons();

  function sendOTP() {
    const phone = document.getElementById("phone").value;

    if (phone.length < 10) {
      alert("Enter valid phone number");
      return;
    }

    // Demo OTP (since Firebase costs money)
    alert("Demo OTP sent: 1234");

    document.getElementById("phoneBox").style.display = "none";
    document.getElementById("otpBox").style.display = "block";
  }

  function verifyOTP() {
    const otp = document.getElementById("otp").value;

    if (otp === "1234") {
      alert("Login successful!");
      window.location.href = "dashboard.html";
    } else {
      alert("Invalid OTP");
    }
  }

  function goBack() {
    document.getElementById("phoneBox").style.display = "block";
    document.getElementById("otpBox").style.display = "none";
  }
</script>

</body>
</html>
