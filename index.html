<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CropPulse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Logo (Favicon) -->
  <link rel="icon" href="logo.ico">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --primary: #22c55e;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* NAVBAR */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background: #020617;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--primary);
      font-weight: bold;
    }

    .logo img {
      width: 35px;
    }

    nav div {
      display: flex;
      gap: 20px;
    }

    nav a {
      color: var(--text);
      text-decoration: none;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .hero-logo {
      width: 120px;
      margin-bottom: 20px;
    }

    button {
      margin: 10px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      cursor: pointer;
    }

    /* FARM GRID */
    .farm-container {
      position: relative;
      margin-top: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 50px);
      gap: 6px;
      justify-content: center;
    }

    .block {
      width: 50px;
      height: 50px;
      border-radius: 6px;
    }

    .popup {
      position: absolute;
      right: 20px;
      top: 20px;
      background: var(--card);
      padding: 15px;
      border-radius: 12px;
      width: 220px;
      display: none;
    }

    /* FEATURES */
    .features {
      display: flex;
      flex-direction: column;
      max-width: 600px;
      margin: auto;
      gap: 20px;
      padding: 40px;
    }

    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 16px;
      border-left: 4px solid var(--primary);
    }

    /* CHATBOT */
    .chatbot {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--card);
      padding: 10px;
      border-radius: 12px;
      width: 250px;
    }

    #chatBox {
      height: 120px;
      overflow-y: auto;
      font-size: 14px;
    }

    #chatInput {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: none;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <div class="logo">
    <img src="logo.png">
    CropPulse
  </div>

  <div>
    <a href="#">Home</a>
    <a href="#features">Features</a>
    <a href="login.html">Login</a>
    <a href="booking.html">Book Scan</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <img src="logo.png" class="hero-logo">

  <h1>Smart Crop Monitoring</h1>
  <p>Drone + Rover based precision agriculture system</p>

  <button onclick="runDemo()">Run Demo Scan</button>
  <button onclick="location.href='login.html'">Login</button>
  <button onclick="location.href='booking.html'">Book Scan</button>

  <!-- GRID -->
  <div class="farm-container">
    <div id="grid" class="grid"></div>

    <div id="popup" class="popup">
      <h3>Block Details</h3>
      <p id="popupContent"></p>
    </div>
  </div>
</section>

<!-- FEATURES -->
<section id="features" class="features">
  <div class="card">🚁 Drone Scanning – NDVI crop analysis</div>
  <div class="card">🤖 AI System – Smart recommendations</div>
  <div class="card">🚜 Ground Rover – Soil monitoring</div>
  <div class="card">☁️ Cloud Platform – Real-time insights</div>
</section>

<!-- CHATBOT -->
<div class="chatbot">
  <div id="chatBox"></div>
  <input id="chatInput" placeholder="Ask about your crop...">
</div>

<!-- SCRIPT -->
<script>

function runDemo() {
  const grid = document.getElementById("grid");
  const popup = document.getElementById("popup");
  const popupContent = document.getElementById("popupContent");

  grid.innerHTML = "";

  for (let i = 0; i < 36; i++) {
    let block = document.createElement("div");
    block.classList.add("block");

    let data = {
      pH: (5 + Math.random() * 3).toFixed(1),
      moisture: Math.floor(Math.random() * 100),
      pests: Math.floor(Math.random() * 20)
    };

    let rand = Math.random();
    let status = "";

    if (rand > 0.6) {
      block.style.background = "#22c55e";
      status = "Healthy";
    } else if (rand > 0.3) {
      block.style.background = "#eab308";
      status = "Moderate";
    } else {
      block.style.background = "#ef4444";
      status = "Critical";
    }

    block.onmouseover = () => {
      popup.style.display = "block";
      popupContent.innerHTML = `
        <b>Status:</b> ${status}<br>
        🌱 pH: ${data.pH}<br>
        💧 Moisture: ${data.moisture}%<br>
        🐛 Pest: ${data.pests}%<br>
      `;
    };

    grid.appendChild(block);
  }
}

/* CHATBOT */
document.getElementById("chatInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    let input = this.value.toLowerCase();
    let response = "";

    if (input.includes("water")) {
      response = "Increase irrigation in yellow/red zones.";
    } else if (input.includes("pest")) {
      response = "Apply pesticide in critical zones.";
    } else {
      response = "Crop health is monitored using drone + rover.";
    }

    document.getElementById("chatBox").innerHTML += `
      <div>👨‍🌾 ${input}</div>
      <div>🤖 ${response}</div>
    `;

    this.value = "";
  }
});

</script>

</body>
</html>
